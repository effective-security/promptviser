---
service: promptviser
region: local
cluster: ${NODENAME}
environment: test

log_levels:
  - repo: "*"
    level: TRACE
  - repo: github.com/effective-security/promptviser
    package: "*"
    level: TRACE
  - repo: github.com/effective-security/promptviser/health
    package: xhttp
    level: ERROR
  - repo: github.com/effective-security/promptviser/server/service
    package: "*"
    level: DEBUG

metrics:
  # specifies if the metrics provider is disabled
  disabled: true
  # the metrics provider: prometeus|inmem
  provider: inmem

sql:
  # specifies the connection string. It can be prefixed with file:// or env:// to load the source from a file or environment variable.
  data_source: file://../../etc/dev/sql-conn-adviserdb.txt
  # the directory that contains migrations.
  migrations_dir: ../../sql/adviserdb/migrations

servers:
  wfe:
    listen_urls:
      - http://0.0.0.0:7880
    services:
      - status
    timeout:
      request: 3s
    keep_alive:
      min_time: 60s
      interval: 30s
      timeout: 180s
    #swagger:
    #  enabled: true
    #  files:
    #    cis: ${PROMPTVISER_CONFIG_DIR}/../../../Documentation/dev-guide/apispec/swagger/cis.swagger.json
    #    status: ${PROMPTVISER_CONFIG_DIR}/../../../Documentation/dev-guide/apispec/swagger/status.swagger.json
    cors: &cors
      enabled: true
      max_age: 600
      allow_credentials: true
      allowed_origins:
        - "*"
      allowed_methods:
        - HEAD
        - OPTIONS
        - GET
        - POST
        - DELETE
      allowed_headers:
        - Accept
        - Content-Type
        - Content-Length
        - Accept-Encoding
        - Authorization
        - User-Agent
        - Referer
        - X-Device-ID
        - sec-ch-ua
        - sec-ch-ua-mobile
    # configuration for the authorization module
    authz:
      &authz # allow any non-authenticated request access to this path and its children
      allow_any:
        - /v1/auth
        - /v1/status
        - /pb.Status
      # allow any authenticated request that includes a non empty role
      allow_any_role:
      # allow the specified roles access to this path and its children, in format: ${path}:${role},${role}
      allow:
      # specifies to log allowed access to Any role
      log_allowed_any: true
      # specifies to log allowed access
      log_allowed: true
      # specifies to log denied access
      log_denied: true

  wfe2:
    listen_urls:
      - https://0.0.0.0:7891
    server_tls:
      cert: /tmp/promptviser/certs/promptviser_peer_wfe.pem
      key: /tmp/promptviser/certs/promptviser_peer_wfe.pem
      trusted_ca: /tmp/promptviser/certs/trusty_root_ca.pem
    services:
      - adviser
      - status
    timeout:
      request: 3s
    keep_alive:
      min_time: 60s
      interval: 30s
      timeout: 180s
    cors: *cors
    authz: *authz

client:
  client_tls:
    cert: /tmp/trusty/certs/trusty_${ENVIRONMENT}_client.pem
    key: /tmp/trusty/certs/trusty_${ENVIRONMENT}_client.pem
    trusted_ca: /tmp/trusty/certs/trusty_${ENVIRONMENT}_root_ca.pem
  server_url:
    cis: http://localhost:7880
    wfe: https://localhost:7891
    ca: https://localhost:7892
