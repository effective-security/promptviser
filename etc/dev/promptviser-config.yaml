---
# specifies the Region / Datacenter where the instance is running
region: dev
# specifies the environment where the instance is running: prod|stage|dev
environment: dev
# specifies the service name (to be used in logs, metrics, etc)
service: promptviser
# specifies the cluster name
cluster: local

log_levels:
  - repo: "*"
    level: TRACE
  - repo: github.com/effective-security/promptviser
    package: "*"
    level: TRACE
  - repo: github.com/effective-security/promptviser/pkg
    package: "*"
    level: DEBUG
  - repo: github.com/effective-security/promptviser/server
    package: "*"
    level: DEBUG
  - repo: github.com/effective-security/promptviser/promptviser/backend/service
    package: "*"
    level: DEBUG

metrics:
  # specifies if the metrics provider is disabled
  disabled: false
  prefix: promptviser
  runtime_metrics: true
  allowed_prefixes:
    - promptviser
  blocked_prefixes:
    - promhttp
  # the metrics provider: prometheus|inmem
  provider: prometheus
  prometheus:
    expiration: 1m
    addr: "127.0.0.1:19090"

jwt_provider: ${PROMPTVISER_CONFIG_DIR}/jwt-provider.yaml
oauth2_clients: ${PROMPTVISER_CONFIG_DIR}/oauth2_clients.yaml

sql:
  # specifies the connection string. It can be prefixed with file:// or env:// to load the source from a file or environment variable.
  data_source: file://${PROMPTVISER_CONFIG_DIR}/sql-conn-adviserdb.txt
  # the directory that contains migrations.
  migrations_dir: ${PROMPTVISER_CONFIG_DIR}/../../sql/adviserdb/migrations

tasks:
  # - name: health_check
  #   schedule: "every 60 seconds"
  #   args: ["-ocsp", "/tmp/trusty/certs/trusty_client.pem"]

servers:
  wfe:
    description: Web Front End service
    disabled: false
    listen_urls:
      - https://0.0.0.0:7880
    server_tls:
      cert: /tmp/promptviser/certs/promptviser_peer.pem
      key: /tmp/promptviser/certs/promptviser_peer.key
      trusted_ca: /tmp/promptviser/certs/trusty_root_ca.pem
      client_cert_auth: false
    services:
      - status
      #- adviser
      #- swagger
    timeout:
      request: 3s
    cors: &cors
      enabled: true
      max_age: 600
      allow_credentials: true
      allowed_origins:
        - "*"
      allowed_methods:
        - HEAD
        - OPTIONS
        - GET
        - POST
        - DELETE
      allowed_headers:
        - Accept
        - Content-Type
        - Content-Length
        - Accept-Encoding
        - Accept-Language
        - Authorization
        - User-Agent
        - Referer
        - X-Device-ID
        - Location
        - Link
        - Replay-Nonce
        - sec-ch-ua
        - sec-ch-ua-mobile
        - sec-fetch-dest
        - sec-fetch-mode
    # configuration for the authorization module
    authz:
      # allow any non-authenticated request access to this path and its children
      # /v1/* is allowed
      allow_any:
        - /favicon.ico
        - /v1
        - /metrics
        - /healthz
        - /pb.Adviser
        - /pb.Status
      # allow any authenticated request that includes a non empty role
      allow_any_role:
      # allow the specified roles access to this path and its children, in format: ${path}:${role},${role}
      allow:
      # specifies to log allowed access to Any role
      log_allowed_any: true
      # specifies to log allowed access
      log_allowed: true
      # specifies to log denied access
      log_denied: true
    # configuration for the Identity mappers
    identity_map:
      tls:
        default_authenticated_role: user
        roles:
          promptviser-peer:
            - spiffe://promptviser/peer
          promptviser-client:
            - spiffe://promptviser/client
          promptviser-admin:
            - spiffe://promptviser/admin
      jwt:
        enabled: true
        issuer: https://localhost:7880
        audience: https://localhost:7880
        default_authenticated_role: user
        subject_claim: sub
        tenant_claim: org
        role_claim: email
        roles:
          promptviser-admin:
            - denis@effectivesecurity.pt

client:
  client_tls:
    cert: /tmp/promptviser/certs/promptviser_client.pem
    key: /tmp/promptviser/certs/promptviser_client.key
    trusted_ca: /tmp/promptviser/certs/trusty_root_ca.pem
  server_url:
    wfe: http://localhost:7880
  dial_timeout: 30s
  dial_keep_alive_time: 300s
  dial_keep_alive_timeout: 30s
