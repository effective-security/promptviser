clients:
  - provider_id: github
    client_id: env://PROMPTVISER_GITHUB_CLIENT_ID
    client_secret: env://PROMPTVISER_GITHUB_CLIENT_SECRET
    scopes:
      - openid
      - read:user
      - user:email
      - read:org
      - repo
    response_type: code
    auth_url: https://github.com/login/oauth/authorize
    token_url: https://github.com/login/oauth/access_token
    userinfo_url: https://api.github.com/user
